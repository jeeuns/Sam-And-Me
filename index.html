<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=3.0" />
    <title>Sam and Me</title>
    
    <!--MEDIAPIPE-->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="./src/HandTracking.js"></script>
    
    <!--PHASER-->
    <script src="./lib/phaser.js"></script>
    <script src="./src/Scenes/LoadAssets.js"></script>
    <script src="./src/Scenes/StartScreen.js"></script>
    <script src="./src/Scenes/CalibrationScene.js"></script>
    <script src="./src/Scenes/Room1.js"></script>
    <script src="./src/Scenes/Room2.js"></script>
    <script src="./src/Scenes/Room3.js"></script>
    <script src="./src/Scenes/CutScene.js"></script>
    <script src="./src/Scenes/EndScreen.js"></script>
    <script src="main.js" defer></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        #container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }
        
        #game-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
        }
        
        #phaser-game {
            display: block;
        }
        
        #camera-container {
            width: 100%;
            height: 300px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 3px solid #333;
            position: relative;
        }
        
        #camera-canvas {
            max-width: 100%;
            max-height: 100%;
            /* display: block; */
            object-fit: contain;
            transform: scaleX(-1); /* Mirror the camera */
        }
        
        #camera-label {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            font-size: 14px;
            border-radius: 3px;
            z-index: 10;
        }
        
        #camera-status {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 3px;
            z-index: 10;
        }
        
        .status-active {
            color: #00ff00 !important;
        }
        
        .status-inactive {
            color: #ff0000 !important;
        }
        
        /* Responsive adjustments */
        @media (max-width: 1440px) {
            #camera-container {
                height: 250px;
            }
        }
        
        @media (max-width: 1024px) {
            #camera-container {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="game-container">
            <div id="phaser-game"></div>
        </div>
        <div id="camera-container">
            <div id="camera-label">📷 Hand Tracking Camera</div>
            <div id="camera-status" class="status-inactive">● Initializing...</div>
            <canvas id="camera-canvas"></canvas>
            <canvas id="movement-overlay" style="position: absolute; top: 0; left: 0; pointer-events: none;"></canvas>
        </div>
    </div>
</body>
</html>
